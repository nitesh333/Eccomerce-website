<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shopping Cart | Rakiyansh</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f9; color: #1a1c1c; min-height: 100vh;}
.serif-italic { font-family: 'Noto Serif', serif; font-style: italic; }
.spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #fff; animation: spin 1s linear infinite; display: none; margin: 0 auto; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="bg-[#f9f9f9] border-b p-6 flex justify-between items-center">
    <a href="/" class="text-2xl font-serif font-bold text-[#9c3032] uppercase tracking-widest">Rakiyansh</a>
    <div class="text-sm font-bold text-gray-500">Secure Checkout</div>
</header>

<main class="container mx-auto px-8 py-16 max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-12">
    <div>
        <h1 class="text-3xl font-serif font-bold mb-8">Shopping <span class="serif-italic">Bag</span></h1>
        
        <div id="cartItems" class="bg-white p-8 rounded shadow-sm border-t border-gray-200 space-y-4">
            <!-- items -->
        </div>

        <div class="mt-8 text-right bg-white p-6 shadow-sm border border-gray-100 rounded">
            <h3 class="text-2xl font-bold text-[#1a1c1c]">Total: <span id="cartTotal" class="text-[#9c3032]">$0</span></h3>
        </div>
    </div>

    <div id="checkoutSection" class="bg-[#f4f3f3] p-8 rounded border-t-4 border-[#9c3032] hidden">
        <h3 class="text-xl font-bold mb-6 uppercase tracking-widest text-[#1a1c1c]">Payment Details</h3>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">Shipping Address</label>
                <textarea id="address" class="w-full border-none p-3 rounded" rows="3" placeholder="123 Luxury Lane..."></textarea>
            </div>
            
            <div class="pt-4 border-t border-gray-300">
                <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">Card Name</label>
                <input type="text" class="w-full border-none p-3 rounded" placeholder="John Doe">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">Card Number (Dummy)</label>
                <input type="text" class="w-full border-none p-3 rounded" placeholder="4111 1111 1111 1111" maxlength="19">
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">Expiry</label>
                    <input type="text" class="w-full border-none p-3 rounded" placeholder="MM/YY" maxlength="5">
                </div>
                <div class="w-1/2">
                    <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">CVC</label>
                    <input type="text" class="w-full border-none p-3 rounded" placeholder="123" maxlength="3">
                </div>
            </div>

            <button id="checkoutBtn" onclick="processPayment()" class="w-full bg-[#1a1c1c] text-white py-4 mt-8 uppercase tracking-[2px] font-bold text-sm hover:bg-[#9c3032] transition-colors relative">
                <span id="btnText">Pay Now</span>
                <div id="btnSpinner" class="spinner absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 !m-0"></div>
            </button>
        </div>
    </div>
</main>

<script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let currentCurrency = localStorage.getItem('currency') || 'USD';
    const EXCHANGE_RATE = 280;

    function formatPrice(usdPrice) {
        if(currentCurrency === 'PKR') return "Rs " + (usdPrice * EXCHANGE_RATE).toLocaleString();
        return "$" + Number(usdPrice).toLocaleString();
    }

    function renderCart() {
        const container = document.getElementById('cartItems');
        if(cart.length === 0) {
            container.innerHTML = "<p class='text-gray-500'>Your bag is empty.</p><a href='/' class='text-[#9c3032] mt-4 block'>← Continue Shopping</a>";
            document.getElementById('checkoutSection').classList.add('hidden');
            return;
        }

        let total = 0;
        container.innerHTML = cart.map((item, index) => {
            total += item.price * item.qty;
            return `
            <div class="flex justify-between items-center border-b pb-4 last:border-0 last:pb-0">
                <div>
                    <h4 class="font-bold text-[#1a1c1c]">${item.name}</h4>
                    <p class="text-xs text-gray-500 mt-1">Qty: ${item.qty} &times; ${formatPrice(item.price)}</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="font-bold text-[#9c3032]">${formatPrice(item.price * item.qty)}</div>
                    <button onclick="removeItem(${index})" class="text-gray-400 hover:text-red-500 text-xs border border-gray-200 px-2 rounded">Remove</button>
                </div>
            </div>`;
        }).join('');

        document.getElementById('cartTotal').innerText = formatPrice(total);
        document.getElementById('checkoutSection').classList.remove('hidden');
    }

    function removeItem(index) {
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    async function processPayment() {
        const token = localStorage.getItem('token');
        if(!token) {
            alert("Please log in to checkout securely.");
            window.location.href = '/login.html';
            return;
        }

        const address = document.getElementById('address').value;
        if(!address) {
            alert("Shipping address is required.");
            return;
        }

        // UI Loading State (Simulated Payment Gateway)
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('btnSpinner');
        const btn = document.getElementById('checkoutBtn');
        
        btn.disabled = true;
        btnText.style.opacity = '0';
        spinner.style.display = 'block';

        // Simulate 2 seconds of payment processing
        setTimeout(async () => {
            const totalAmount = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ items: cart, totalAmount, shippingAddress: address })
                });

                if(res.ok) {
                    alert("Payment Successful! Order placed.");
                    localStorage.removeItem('cart');
                    window.location.href = '/profile.html';
                } else {
                    const data = await res.json();
                    alert("Checkout failed: " + data.message);
                    resetBtn();
                }
            } catch(err) {
                alert("Network error during checkout");
                resetBtn();
            }
        }, 2000);

        function resetBtn() {
            btn.disabled = false;
            btnText.style.opacity = '1';
            spinner.style.display = 'none';
        }
    }

    renderCart();
</script>
</body>
</html>
