<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | The Curator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f9; color: #1a1c1c; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.serif-italic { font-family: 'Noto Serif', serif; font-style: italic; }
</style>
</head>
<body>

<div class="bg-white p-12 rounded shadow-2xl w-full max-w-md border-t-8 border-[#9c3032]">
    <h2 class="text-3xl font-serif font-bold text-[#1a1c1c] mb-2 text-center">Welcome <span class="serif-italic">Back</span></h2>
    <p class="text-center text-sm text-gray-500 mb-8">Login to your account.</p>

    <form id="loginForm" class="space-y-6">
        <div>
            <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-2">Email</label>
            <input type="email" id="email" class="w-full bg-[#f4f3f3] border-none px-4 py-3 focus:ring-1 focus:ring-[#9c3032]" required>
        </div>
        <div>
            <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-2">Password</label>
            <input type="password" id="password" class="w-full bg-[#f4f3f3] border-none px-4 py-3 focus:ring-1 focus:ring-[#9c3032]" required>
        </div>
        <button type="submit" class="w-full bg-[#9c3032] text-white py-4 uppercase tracking-[2px] font-bold text-sm hover:bg-[#b00619] transition-colors mt-6">Login</button>
    </form>
    
    <div class="text-center mt-6">
        <a href="/register.html" class="text-sm text-[#9c3032] hover:underline font-bold">Don't have an account? Register.</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('/api/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if(res.ok) {
            localStorage.setItem('token', data.token);
            window.location.href = '/';
        } else {
            alert(data.message);
        }
    } catch (err) {
        alert("Login failed");
    }
});
</script>
</body>
</html>
