<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Profile | The Curator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f9; color: #1a1c1c; min-height: 100vh;}
.serif-italic { font-family: 'Noto Serif', serif; font-style: italic; }
</style>
</head>
<body>

<header class="bg-[#f9f9f9] border-b p-6 flex justify-between items-center">
    <a href="/" class="text-2xl font-serif font-bold text-[#9c3032]">The Curator</a>
    <button onclick="logout()" class="text-sm font-bold text-gray-500 hover:text-[#9c3032]">Logout</button>
</header>

<main class="container mx-auto px-8 py-16 max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-12">
    
    <div class="col-span-1 border-r border-gray-200 pr-8">
        <h2 class="text-3xl font-serif font-bold mb-6">Hello, <br><span id="userName" class="text-[#9c3032] serif-italic">...</span></h2>
        <p class="text-gray-600 mb-8" id="userEmail">...</p>
        
        <div class="mt-8">
            <a href="/request.html" class="block w-full text-center bg-[#f4f3f3] text-[#1a1c1c] py-4 uppercase tracking-widest font-bold text-xs hover:bg-gray-200 transition-colors mb-4 border border-gray-300">Submit Custom Request</a>
        </div>
    </div>

    <div class="col-span-1 md:col-span-2 space-y-12">
        <section>
            <h3 class="text-xl font-bold uppercase tracking-widest mb-6 border-b pb-2">Order History</h3>
            <div id="ordersList" class="space-y-4">
                <p class="text-gray-500">Loading orders...</p>
            </div>
        </section>

        <section>
            <h3 class="text-xl font-bold uppercase tracking-widest mb-6 border-b pb-2">My Design Requests</h3>
            <div id="requestsList" class="space-y-4">
                <p class="text-gray-500">Loading requests...</p>
            </div>
        </section>
    </div>

</main>

<script>
    const token = localStorage.getItem('token');
    if(!token) {
        window.location.href = '/login.html';
    }

    async function loadProfile() {
        try {
            // Load User Info
            const userRes = await fetch('/api/users/me', { headers: { 'Authorization': `Bearer ${token}` }});
            const userData = await userRes.json();
            if(!userRes.ok) throw new Error("Not authorized");
            document.getElementById('userName').innerText = userData.name;
            document.getElementById('userEmail').innerText = userData.email;

            // Load Orders
            const ordersRes = await fetch('/api/orders/myorders', { headers: { 'Authorization': `Bearer ${token}` }});
            const ordersData = await ordersRes.json();
            const orderContainer = document.getElementById('ordersList');
            if(ordersData.length === 0) {
                orderContainer.innerHTML = '<p class="text-gray-500">No orders placed yet.</p>';
            } else {
                orderContainer.innerHTML = ordersData.map(o => `
                    <div class="bg-white p-6 rounded shadow-sm border border-gray-100 flex justify-between items-center">
                        <div><p class="font-bold text-[#1a1c1c]">Order #${o.id}</p><p class="text-xs text-gray-500 mt-1">${new Date(o.createdAt).toLocaleDateString()}</p></div>
                        <div class="text-right"><p class="font-bold text-[#9c3032]">$${o.totalAmount}</p><p class="text-xs font-bold uppercase px-3 py-1 bg-gray-100 mt-2 rounded">${o.status}</p></div>
                    </div>
                `).join('');
            }

            // Load Requests
            const requestsRes = await fetch('/api/requests/myrequests', { headers: { 'Authorization': `Bearer ${token}` }});
            const requestsData = await requestsRes.json();
            const requestsContainer = document.getElementById('requestsList');
            if(requestsData.length === 0) {
                requestsContainer.innerHTML = '<p class="text-gray-500">No custom designs requested.</p>';
            } else {
                requestsContainer.innerHTML = requestsData.map(r => `
                    <div class="bg-white p-6 rounded shadow-sm border border-gray-100">
                        <p class="font-bold text-[#1a1c1c] mb-2">Request #${r.id} <span class="text-xs font-bold uppercase px-2 py-1 bg-gray-100 rounded ml-2">${r.status}</span></p>
                        <p class="text-sm text-gray-600">${r.description}</p>
                    </div>
                `).join('');
            }

        } catch(err) {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/';
    }

    loadProfile();
</script>
</body>
</html>
