<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Product Details | The Curator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9f9; color: #1a1c1c; }
.serif-italic { font-family: 'Noto Serif', serif; font-style: italic; }
</style>
</head>
<body class="bg-[#f9f9f9]">

<header class="bg-[#f9f9f9] border-b p-6 flex justify-between items-center">
    <a href="/" class="text-2xl font-serif font-bold text-[#9c3032]">The Curator</a>
    <div class="flex gap-4">
        <a href="/cart.html" class="text-[#9c3032]"><span class="material-symbols-outlined">shopping_bag</span></a>
    </div>
</header>

<main class="container mx-auto px-8 py-16">
    <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 gap-16">
        <div class="text-center py-24">Loading product details...</div>
    </div>
</main>

<script>
    async function loadProduct() {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if(!productId) {
            document.getElementById('product-container').innerHTML = `<div class="text-red-500">Product Not Found.</div>`;
            return;
        }

        try {
            const res = await fetch(`/api/products/${productId}`);
            const product = await res.json();

            if(!res.ok) throw new Error("Not found");

            document.getElementById('product-container').innerHTML = `
                <div>
                    <img src="${product.imageUrl || 'https://images.unsplash.com/photo-1601121141461-9d6647bca1ed?auto=format&fit=crop&q=80'}" class="w-full h-auto object-cover rounded shadow-lg" />
                </div>
                <div class="flex flex-col justify-center">
                    <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">${product.category}</p>
                    <h1 class="text-5xl font-serif font-bold text-[#1a1c1c] mb-6">${product.name}</h1>
                    <p class="text-2xl text-[#9c3032] font-bold mb-6">$${product.price}</p>
                    <p class="text-gray-600 leading-relaxed mb-8">${product.description}</p>
                    <button onclick="addToCart(${product.id}, '${product.name}', ${product.price})" class="bg-[#9c3032] text-white py-4 uppercase tracking-[2px] font-bold text-sm hover:bg-[#b00619] transition-colors w-full md:w-auto px-12">
                        Add to Cart
                    </button>
                </div>
            `;
        } catch(err) {
            document.getElementById('product-container').innerHTML = `<div class="text-red-500">Failed to load product.</div>`;
        }
    }

    function addToCart(id, name, price) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const existing = cart.find(i => i.id === id);
        if(existing) {
            existing.qty += 1;
        } else {
            cart.push({ id, name, price, qty: 1 });
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        window.location.href = '/cart.html';
    }

    loadProduct();
</script>
</body>
</html>
